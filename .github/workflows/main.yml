name: Build ChainLock APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Arrange files into correct structure
        run: |
          mkdir -p app/src/main/java/com/chainlock/app
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          mv MainActivity.kt app/src/main/java/com/chainlock/app/
          mv ChainStorage.kt app/src/main/java/com/chainlock/app/
          mv AccessibilityLockService.kt app/src/main/java/com/chainlock/app/
          mv BlockScreenActivity.kt app/src/main/java/com/chainlock/app/
          mv UsageTrackerService.kt app/src/main/java/com/chainlock/app/
          mv BootReceiver.kt app/src/main/java/com/chainlock/app/

          mv AndroidManifest.xml app/src/main/
          mv styles.xml app/src/main/res/values/
          mv accessibility_service_config.xml app/src/main/res/xml/

          mv "build (1).gradle" app/build.gradle

      - name: Setup Gradle
        run: |
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -O gradlew
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: ChainLock-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
